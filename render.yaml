services:
  # Backend Web Service
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend          # FIX: build context must be ./backend so COPY package*.json finds the file
    plan: free
    envVars:
      - key: DB_HOST
        sync: false        # Paste Internal Host from Render PostgreSQL dashboard
      - key: DB_USER
        sync: false        # Paste Username from Render PostgreSQL dashboard
      - key: DB_PASSWORD
        sync: false        # Paste Password from Render PostgreSQL dashboard
      - key: DB_NAME
        sync: false        # Paste Database name from Render PostgreSQL dashboard
      - key: DB_PORT
        value: 5432
      - key: DB_SSL
        value: true
      - key: PORT
        value: 5001

  # Frontend Web Service
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend         # FIX: build context must be ./frontend so COPY package*.json finds the file
    plan: free
    envVars:
      - key: PORT
        value: 80

# NOTE: No database service block here — using Render's managed PostgreSQL.
# Create the PostgreSQL database manually on Render dashboard first,
# then copy the credentials into the sync:false fields above when applying the Blueprint.
#
# REACT_APP_API_URL is intentionally NOT set here — React env vars are baked in at BUILD time,
# not runtime, so setting it here has no effect. The frontend uses relative /api/ URLs and
# nginx (inside the frontend container) proxies them to the backend service.
