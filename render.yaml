databases:
  - name: todo-db
    databaseName: todo_app
    user: todoapp
    plan: free

services:
  - type: web
    name: todo-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    databases:
      - name: todo-db
    envVars:
      - key: PORT
        value: "5001"

  - type: web
    name: todo-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://todo-backend.onrender.com
